<!DOCTYPE html>
<html>
<body>
<h2>狼人杀聊天</h2>

<input id="msg" type="text" placeholder="输入聊天消息">
<button onclick="sendMessage()">发送</button>

<br><br>
<input id="votePlayer" type="number" placeholder="选择投票玩家编号">
<button onclick="votePlayer()">投票</button>

<ul id="chat"></ul>

<script>
let playerId = prompt("Enter your ID");
let ws = new WebSocket(`ws://localhost:8000/ws/${playerId}`);

ws.onmessage = function(event) {
    let data = JSON.parse(event.data);
    let li = document.createElement("li");
    li.textContent = `${data.player}: ${data.msg}`;
    document.getElementById("chat").appendChild(li);
};

function sendMessage() {
    let input = document.getElementById("msg");
    if (input.value.trim() === "") return;
    ws.send(JSON.stringify({"type":"chat","msg":input.value}));
    input.value = "";
}

function votePlayer() {
    let input = document.getElementById("votePlayer");
    let playerNum = parseInt(input.value);
    if (isNaN(playerNum)) {
        alert("请输入有效的玩家编号！");
        return;
    }
    ws.send(JSON.stringify({"type":"vote","player":playerId,"target":playerNum}));
    input.value = "";
}
</script>
</body>
</html>
